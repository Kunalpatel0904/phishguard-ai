<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard AI — Scam & Phishing Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --danger: #ff3c5f;
    --warning: #ffaa00;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .shield-icon {
    width: 48px;
    height: 48px;
    position: relative;
  }

  .shield-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 12px var(--accent));
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  h1 span {
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,255,136,0.4);
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* Badge */
  .badge {
    display: inline-block;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 2px;
    margin-top: 14px;
    text-transform: uppercase;
  }

  /* Input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  textarea {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    min-height: 160px;
    transition: border-color 0.3s;
    outline: none;
  }

  textarea:focus {
    border-color: rgba(0,255,136,0.4);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.06);
  }

  textarea::placeholder { color: var(--muted); }

  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .example-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .example-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Analyze button */
  .btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-transform: uppercase;
  }

  .btn:hover:not(:disabled) {
    background: #00ffaa;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,255,136,0.25);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  /* Result card */
  .result {
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .result-header {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .result-header.safe { background: rgba(0,255,136,0.08); border-bottom: 1px solid rgba(0,255,136,0.2); }
  .result-header.danger { background: rgba(255,60,95,0.08); border-bottom: 1px solid rgba(255,60,95,0.2); }
  .result-header.warning { background: rgba(255,170,0,0.08); border-bottom: 1px solid rgba(255,170,0,0.2); }

  .verdict-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .verdict-text h2 {
    font-size: 1.4rem;
    font-weight: 800;
  }

  .safe .verdict-text h2 { color: var(--accent); }
  .danger .verdict-text h2 { color: var(--danger); }
  .warning .verdict-text h2 { color: var(--warning); }

  .verdict-text p {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .result-body {
    padding: 24px 28px;
  }

  .risk-bar-wrap {
    margin-bottom: 24px;
  }

  .risk-bar-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .risk-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .risk-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
    width: 0%;
  }

  .risk-fill.safe { background: var(--accent); }
  .risk-fill.danger { background: var(--danger); }
  .risk-fill.warning { background: var(--warning); }

  .analysis-section {
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .analysis-text {
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--text);
  }

  .flags {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .flag {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 5px;
    border-left: 3px solid var(--border);
    font-size: 0.88rem;
    line-height: 1.5;
  }

  .flag.red { border-left-color: var(--danger); }
  .flag.yellow { border-left-color: var(--warning); }
  .flag.green { border-left-color: var(--accent); }

  .flag-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .flag.red .flag-dot { background: var(--danger); }
  .flag.yellow .flag-dot { background: var(--warning); }
  .flag.green .flag-dot { background: var(--accent); }

  .action-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    font-size: 0.9rem;
    line-height: 1.7;
  }

  /* Reset btn */
  .reset-btn {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .reset-btn:hover { color: var(--text); border-color: var(--muted); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeUp 0.7s 0.4s ease both;
  }

  /* Error */
  .error-msg {
    background: rgba(255,60,95,0.08);
    border: 1px solid rgba(255,60,95,0.2);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    margin-top: 12px;
    display: none;
  }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="shield-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 4L6 12V24C6 34.5 14 43.5 24 46C34 43.5 42 34.5 42 24V12L24 4Z" stroke="#00ff88" stroke-width="2" fill="rgba(0,255,136,0.08)"/>
          <path d="M16 24L21 29L32 18" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Phish<span>Guard</span> AI</h1>
    </div>
    <p class="tagline">AI-Powered Scam & Phishing Detector</p>
    <div class="badge">🎓 Built for AWDAMD Slingshot · AI + Cybersecurity</div>
  </div>

  <div class="card">
    <div class="card-label">Paste suspicious content</div>
    <textarea id="inputText" placeholder="Paste a suspicious email, link, message, job offer, or any text you want to check...

Example: 'Congratulations! You've won $5,000. Click here to claim your prize: bit.ly/claim-now. Reply with your bank details immediately.'"></textarea>

    <div class="examples">
      <span style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:1px;align-self:center;">Try:</span>
      <button class="example-btn" onclick="loadExample('phishing')">📧 Phishing Email</button>
      <button class="example-btn" onclick="loadExample('job')">💼 Fake Job Offer</button>
      <button class="example-btn" onclick="loadExample('safe')">✅ Legit Message</button>
      <button class="example-btn" onclick="loadExample('scholarship')">🎓 Scholarship Scam</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn" id="analyzeBtn" onclick="analyze()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">🔍 Analyze Now</span>
    </button>
  </div>

  <div class="result" id="result">
    <div class="result-header" id="resultHeader">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div class="verdict-text">
        <h2 id="verdictTitle"></h2>
        <p id="verdictSub"></p>
      </div>
    </div>
    <div class="result-body">
      <div class="risk-bar-wrap">
        <div class="risk-bar-label">
          <span>Risk Level</span>
          <span id="riskPercent"></span>
        </div>
        <div class="risk-bar">
          <div class="risk-fill" id="riskFill"></div>
        </div>
      </div>

      <div class="analysis-section">
        <div class="section-title">Analysis</div>
        <div class="analysis-text" id="analysisText"></div>
      </div>

      <div class="analysis-section">
        <div class="section-title">Red Flags Detected</div>
        <div class="flags" id="flagsList"></div>
      </div>

      <div class="analysis-section">
        <div class="section-title">What You Should Do</div>
        <div class="action-box" id="actionText"></div>
      </div>
    </div>
    <div style="padding: 0 28px 24px">
      <button class="reset-btn" onclick="reset()">← Analyze Another</button>
    </div>
  </div>

  <div class="footer">PhishGuard AI · Powered by Claude AI · AWDAMD Slingshot 2025</div>
</div>

<script>
const examples = {
  phishing: `URGENT: Your bank account has been suspended!

Dear Customer,

We detected suspicious activity on your account. Your account will be permanently closed in 24 hours unless you verify your details immediately.

Click here to verify: http://secure-bank-verify.xyz/login

Please provide:
- Full name
- Account number
- Password
- Social Security Number

Failure to respond will result in permanent account suspension.

Best regards,
Security Team`,

  job: `AMAZING WORK FROM HOME OPPORTUNITY!!!

Earn $500-$2000 per day working from home! No experience needed!

We are hiring Data Entry Specialists. Requirements:
- Must be 18+
- Internet connection
- A small registration fee of $99 (refundable after first payment)

Send your name, address, and bank account details to: jobs.easyincome247@gmail.com

ACT NOW - Only 3 spots left!!!`,

  safe: `Hi,

This is a reminder that your library book "Introduction to Machine Learning" is due on March 15th. 

You can renew it online at library.university.edu/renew using your student ID, or visit us in person at the Main Library, Room 101.

If you have any questions, please contact us at library@university.edu or call (555) 123-4567.

Best,
University Library`,

  scholarship: `CONGRATULATIONS! You have been selected for a $10,000 scholarship!

You were chosen from millions of students. To claim your scholarship:

1. Send processing fee of $150 via Western Union to: John Smith, Lagos Nigeria
2. Provide your SSN and bank details for direct deposit
3. Reply within 48 hours or scholarship will be forfeited

This is a limited time offer! Don't miss this life-changing opportunity!

scholarship-global-awards@gmail.com`
};

function loadExample(type) {
  document.getElementById('inputText').value = examples[type];
}

async function analyze() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) {
    showError('Please paste some text to analyze.');
    return;
  }
  if (text.length < 10) {
    showError('Please paste a longer message for accurate analysis.');
    return;
  }

  hideError();
  setLoading(true);

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are PhishGuard AI, an expert cybersecurity analyst specializing in detecting phishing, scams, and social engineering attacks. Analyze the provided text and respond ONLY with a valid JSON object (no markdown, no backticks) in this exact format:
{
  "verdict": "DANGER" | "WARNING" | "SAFE",
  "riskScore": <number 0-100>,
  "title": "<short verdict title>",
  "subtitle": "<one line summary>",
  "analysis": "<2-3 sentence analysis explaining your assessment>",
  "flags": [
    {"type": "red"|"yellow"|"green", "text": "<flag description>"}
  ],
  "action": "<clear action the user should take>"
}

Be accurate, educational, and helpful. Include 2-5 flags. For SAFE messages, use green flags.`,
        messages: [{ role: "user", content: `Analyze this for phishing/scam indicators:\n\n${text}` }]
      })
    });

    const data = await response.json();
    const raw = data.content[0].text;
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    showResult(result);
  } catch (err) {
    showError('Analysis failed. Please check your connection and try again.');
    console.error(err);
  } finally {
    setLoading(false);
  }
}

function showResult(r) {
  const resultEl = document.getElementById('result');
  const header = document.getElementById('resultHeader');

  // Set verdict styling
  header.className = 'result-header ' + r.verdict.toLowerCase();
  if (r.verdict === 'DANGER') {
    document.getElementById('verdictIcon').textContent = '🚨';
  } else if (r.verdict === 'WARNING') {
    document.getElementById('verdictIcon').textContent = '⚠️';
    header.className = 'result-header warning';
  } else {
    document.getElementById('verdictIcon').textContent = '✅';
  }

  document.getElementById('verdictTitle').textContent = r.title;
  document.getElementById('verdictSub').textContent = r.subtitle;
  document.getElementById('riskPercent').textContent = r.riskScore + '% Risk';
  document.getElementById('analysisText').textContent = r.analysis;
  document.getElementById('actionText').textContent = r.action;

  // Risk bar
  const fill = document.getElementById('riskFill');
  fill.className = 'risk-fill ' + r.verdict.toLowerCase();
  setTimeout(() => { fill.style.width = r.riskScore + '%'; }, 100);

  // Flags
  const flagsList = document.getElementById('flagsList');
  flagsList.innerHTML = '';
  r.flags.forEach(f => {
    const div = document.createElement('div');
    div.className = `flag ${f.type}`;
    div.innerHTML = `<div class="flag-dot"></div><span>${f.text}</span>`;
    flagsList.appendChild(div);
  });

  resultEl.style.display = 'block';
  document.querySelector('.card').style.display = 'none';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reset() {
  document.getElementById('result').style.display = 'none';
  document.querySelector('.card').style.display = 'block';
  document.getElementById('inputText').value = '';
  document.getElementById('riskFill').style.width = '0%';
}

function setLoading(val) {
  const btn = document.getElementById('analyzeBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  btn.disabled = val;
  spinner.style.display = val ? 'block' : 'none';
  btnText.textContent = val ? 'Analyzing...' : '🔍 Analyze Now';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
</body>
</html>
